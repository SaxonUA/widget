<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Віджет бою</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg-color: rgba(0,0,0,0.0);
      --text-color:#ffffff;

      --hp-bg: rgba(0,0,0,0.35);
      --hp-border: rgba(255,255,255,0.18);
      --hp-fill: #20c76a;

      --widget-width: 360px;

      --stroke: rgba(0,0,0,0.90);
      --stroke-w: 1px;

      --green:#36ff50;
    }

    body{
      margin:0;
      padding:10px;
      height:100vh;
      background:var(--bg-color);
      color:var(--text-color);
      display:flex;
      justify-content:flex-start;
      align-items:flex-start;
      font-family: "Roboto Condensed", Arial, sans-serif;
    }

    .battle-widget{
      width: var(--widget-width);
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      gap:.55rem;
      font-weight: 700;
    }

    .hp-section{
      width: 100%;
      margin-bottom: .05rem;
    }

    .hp-bar{
      width: 65%;
      height: 18px;
      position: relative;
      background: var(--hp-bg);
      border: 1px solid var(--hp-border);
      border-radius: 999px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.35);
      margin: 0;
    }

    .hp-fill{
      height: 100%;
      width: 0%;
      background: var(--hp-fill);
      transition: width 200ms linear;
    }

    .hp-overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: 16px;
      letter-spacing: .3px;
      color: rgba(255,255,255,0.98);
      user-select:none;
      white-space:nowrap;

      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;

      -webkit-text-stroke: var(--stroke-w) var(--stroke);
      paint-order: stroke fill;
      pointer-events:none;
    }

    .stat-block{
      display:flex;
      align-items:center;
      gap:.6rem;
    }

    .stat-label{
      width: 40px;
      flex: 0 0 40px;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow: visible;
    }

    .stat-label svg{
      width: 18px;
      height: 18px;
      fill: #ffffff;

      filter:
        drop-shadow(0 0 2px rgba(54,255,80,0.9))
        drop-shadow(0 0 5px rgba(54,255,80,0.5))
        drop-shadow(0 0 10px rgba(54,255,80,0.25));
    }

    .damage-icon svg,
    .assist-icon svg{
      width: 34px;
      height: 34px;
    }

    .stat-value{
      font-size: 20px;
      min-width: 90px;
      letter-spacing: .2px;
      color: rgba(255,255,255,0.98);

      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;

      -webkit-text-stroke: var(--stroke-w) var(--stroke);
      paint-order: stroke fill;
    }
  </style>
</head>

<body>
  <div class="battle-widget">

    <div class="hp-section">
      <div class="hp-bar">
        <div id="hp-fill" class="hp-fill"></div>
        <div id="hp-overlay" class="hp-overlay">0 / 0</div>
      </div>
    </div>

    <!-- Мапа -->
    <div class="stat-block">
      <div class="stat-label">
        <svg viewBox="0 0 24 24">
          <path d="M12 2c-3.9 0-7 3.1-7 7 0 5.2 6 12.6 6.3 12.9.4.5 1.1.5 1.5 0C13 21.6 19 14.2 19 9c0-3.9-3.1-7-7-7zm0 10a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/>
        </svg>
      </div>
      <div id="map-name" class="stat-value">-</div>
    </div>

    <!-- Дамаг -->
    <div class="stat-block">
      <div class="stat-label damage-icon">
        <svg viewBox="0 0 32 32">
          <path d="M9.361 11.32a.865.865 0 0 1 0-1.225l.734-.734a.866.866 0 0 1 1.224 0l3.672 3.672a.865.865 0 0 1 0 1.224l-.734.734a.865.865 0 0 1-1.224 0L9.361 11.32Zm7.648 7.647a.865.865 0 0 1 0-1.224l.734-.734a.866.866 0 0 1 1.224 0l3.672 3.672a.865.865 0 0 1 0 1.224l-.734.734a.865.865 0 0 1-1.224 0l-3.672-3.672Zm2.112-4.13a.865.865 0 0 1-1.224 0l-.734-.734a.865.865 0 0 1 0-1.224l3.672-3.672a.865.865 0 0 1 1.224 0l.734.734a.865.865 0 0 1 0 1.224l-3.672 3.672Zm-7.956 7.956a.866.866 0 0 1-1.224 0l-.734-.734a.865.865 0 0 1 0-1.224l3.672-3.672a.865.865 0 0 1 1.224 0l.734.734a.865.865 0 0 1 0 1.224l-3.672 3.672Z"/>
        </svg>
      </div>
      <div id="damage-value" class="stat-value">0</div>
    </div>

    <!-- Асист -->
    <div class="stat-block">
      <div class="stat-label assist-icon">
        <!-- без змін -->
        <svg viewBox="0 0 32 32">
          <path d="M13.368 17.123a.184.184 0 0 1 .26 0l2.13 2.129a.185.185 0 0 1 0 .26l-.524.524a.185.185 0 0 1-.261 0l-1.348-1.348a.185.185 0 0 0-.26 0l-1.348 1.348a.185.185 0 0 1-.261 0l-.524-.523a.185.185 0 0 1 0-.262l2.136-2.128Z"/>
        </svg>
      </div>
      <div id="assist-value" class="stat-value">0</div>
    </div>

    <!-- Фраги (НОВА ІКОНКА) -->
    <div class="stat-block">
      <div class="stat-label">
        <svg viewBox="0 0 32 32">
          <path fill-rule="evenodd" d="M17.226 17.608 20.291 16h2.144l2.144 1.072v1.072l-2.59 3.036-4.763-3.572Zm-4.265-3.2.183-.552H3.139v-1.072h10.363l.357-1.072 2.144-1.072 4.288 1.072v2.144l-4.288 2.834-3.042-2.282ZM12.636 16l2.144 1.608-4.544 3.408-2.809-2.872v-1.072L8.592 16h4.044Zm7.148 5.36h-7.562l3.781-2.834 3.78 2.834Z" clip-rule="evenodd"/>
        </svg>
      </div>
      <div id="kills-value" class="stat-value">0</div>
    </div>

  </div>
</body>
</html>
